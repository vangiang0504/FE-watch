<div class="admin-shell">
  <nav class="side-nav">
    <div class="brand">
      <h1>Admin Console</h1>
      <p>Elite Management</p>
    </div>

    <a class="back-to-store" routerLink="/home">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      <span>Về trang chủ</span>
    </a>

    <ul class="nav-list">
      @for (item of navItems; track item.route) {
        <li>
          <a class="nav-link" [routerLink]="item.route" routerLinkActive="active">
            <span class="nav-icon">
              @switch (item.icon) {
                @case ('dashboard') {
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
                }
                @case ('watch') {
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/><path d="M12 9v3l2 2"/><path d="M9 3h6M9 21h6"/></svg>
                }
                @case ('group') {
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="9" r="2.5"/><path d="M17.5 14.5c2.6.3 4.5 2.2 4.5 4.5"/></svg>
                }
                @case ('shipping') {
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="7" width="13" height="10" rx="1"/><path d="M14 10h4l3 3v4h-7z"/><circle cx="6" cy="19" r="1.6"/><circle cx="17.5" cy="19" r="1.6"/></svg>
                }
                @case ('revenue') {
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><circle cx="12" cy="11" r="3"/><path d="M6 8v.01M18 14v.01"/></svg>
                }
              }
            </span>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>

    <div class="nav-footer">
      <a class="nav-link" routerLink="/admin/security" routerLinkActive="active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        </span>
        <span>Bảo mật</span>
      </a>
      <button type="button" class="nav-link nav-logout" [disabled]="loggingOut()" (click)="logout()">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </span>
        <span>{{ loggingOut() ? 'Đang đăng xuất...' : 'Đăng xuất' }}</span>
      </button>
    </div>
  </nav>

  <main class="main-canvas">
    <div class="ambient-glow"></div>
    <div class="content">
      <router-outlet />
    </div>
  </main>
</div>
